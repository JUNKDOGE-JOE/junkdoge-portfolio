<!-- @dsCard group="⑥ Background Skins" name="DevSkin" subtitle="Warm gradient blobs" -->
<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevSkin — JD Kinetic System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root{
    --night:#0a0a0c; --ink:#101015; --bone:#ece8e1; --muted:#9a9aa2; --line:#26262e;
    --accent:#7b61ff; --green:#4ade80;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sc:'Noto Sans SC',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; min-height:100vh; color:var(--bone); font-family:var(--sc);
    background:radial-gradient(120% 80% at 50% 0%, #15151c, var(--night));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1.5rem; padding:3rem 2rem}
  .ds-tag{position:fixed; top:1.1rem; left:1.3rem; font:600 .6rem/1 var(--mono);
    letter-spacing:.24em; color:#5b5b64}
  .ds-head{text-align:center}
  .ds-head h1{margin:0; font:600 1.15rem/1.1 var(--sc)}
  .ds-head p{margin:.5rem auto 0; max-width:34rem; font:.76rem/1.6 var(--sc); color:var(--muted)}
  /* component frame */
  .stage{width:min(680px,92vw); aspect-ratio:16/10; background:#ece8e1;
    border:1px solid var(--line); border-radius:12px; overflow:hidden; position:relative;
    box-shadow:0 30px 80px -30px #000; cursor:crosshair}
  /* warm radial blobs, container slightly larger than frame (-inset), parallax via --mx/--my */
  .blobs{position:absolute; inset:-12%;
    background:
      radial-gradient(32% 40% at 30% 30%, #ffd1bd, transparent 62%),
      radial-gradient(34% 42% at 72% 42%, #ffc0d6, transparent 62%),
      radial-gradient(40% 50% at 50% 84%, #f6b6a4, transparent 62%);
    filter:blur(38px);
    transform:translate(calc((var(--mx,0.5) - 0.5) * -60px), calc((var(--my,0.5) - 0.5) * -60px));
    transition:transform .4s ease-out}
  .hint{position:absolute; left:50%; bottom:.9rem; transform:translateX(-50%);
    font:.58rem/1 var(--mono); letter-spacing:.22em; color:rgba(20,16,12,.32);
    pointer-events:none}
  .specs{display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center}
  .chip{font:.62rem/1 var(--mono); letter-spacing:.04em; color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:.4rem .7rem}
  .chip b{color:var(--green); font-weight:500}
</style>
</head>
<body>
  <div class="ds-tag">JD · ⑥ BACKGROUND SKINS</div>
  <div class="ds-head">
    <h1>DevSkin</h1>
    <p>开发类项目页的背景皮肤——暖白底上三团柔和 radial 渐变 blob(蜜桃 / 粉 / 珊瑚),重度模糊后融成奶油色光晕;鼠标移动时整体轻微视差位移。</p>
  </div>

  <div class="stage" id="stage">
    <div class="blobs" id="blobs"></div>
    <div class="hint">MOVE CURSOR · PARALLAX ±30px</div>
  </div>

  <div class="specs">
    <span class="chip">base <b>#ece8e1</b></span>
    <span class="chip">blobs <b>3×</b></span>
    <span class="chip">blur <b>38px</b></span>
    <span class="chip">parallax <b>±30px</b></span>
    <span class="chip">ease <b>.4s out</b></span>
  </div>

<script>
  const stage=document.getElementById('stage'), blobs=document.getElementById('blobs');
  // cursor inside the stage drives --mx/--my (0..1); blob layer translates inversely
  stage.addEventListener('mousemove',(e)=>{
    const r=stage.getBoundingClientRect();
    blobs.style.setProperty('--mx', ((e.clientX-r.left)/r.width).toFixed(4));
    blobs.style.setProperty('--my', ((e.clientY-r.top)/r.height).toFixed(4));
  });
  stage.addEventListener('mouseleave',()=>{
    blobs.style.setProperty('--mx', 0.5);
    blobs.style.setProperty('--my', 0.5);
  });
</script>
</body>
</html>
