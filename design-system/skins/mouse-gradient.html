<!-- @dsCard group="⑥ Background Skins" name="MouseGradient" subtitle="Cursor-follow focal gradient" -->
<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MouseGradient — JD Kinetic System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root{
    --night:#0a0a0c; --ink:#101015; --bone:#ece8e1; --muted:#9a9aa2; --line:#26262e;
    --accent:#7b61ff; --green:#4ade80;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sc:'Noto Sans SC',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; min-height:100vh; color:var(--bone); font-family:var(--sc);
    background:radial-gradient(120% 80% at 50% 0%, #15151c, var(--night));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1.5rem; padding:3rem 2rem}
  .ds-tag{position:fixed; top:1.1rem; left:1.3rem; font:600 .6rem/1 var(--mono);
    letter-spacing:.24em; color:#5b5b64}
  .ds-head{text-align:center}
  .ds-head h1{margin:0; font:600 1.15rem/1.1 var(--sc)}
  .ds-head p{margin:.5rem auto 0; max-width:34rem; font:.76rem/1.6 var(--sc); color:var(--muted)}
  /* component frame */
  .stage{width:min(680px,92vw); aspect-ratio:16/10; background:#f1d7dd;
    border:1px solid var(--line); border-radius:12px; overflow:hidden; position:relative;
    box-shadow:0 30px 80px -30px #000; cursor:crosshair;
    --gx:50%; --gy:50%}
  /* warm drifting base blobs (subtle) */
  .base{position:absolute; inset:-10%;
    background:
      radial-gradient(40% 48% at 28% 32%, #ffe2e7, transparent 60%),
      radial-gradient(42% 50% at 74% 68%, #e9d4ff, transparent 62%);
    filter:blur(46px); opacity:.85}
  /* focal bloom — centre driven by --gx/--gy, lerped toward cursor each frame */
  .bloom{position:absolute; inset:0; pointer-events:none; mix-blend-mode:screen;
    background:radial-gradient(34% 40% at var(--gx) var(--gy),
      #7b61ff 0%, rgba(123,97,255,.45) 32%, rgba(60,83,71,.18) 55%, transparent 72%)}
  .vignette{position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(80% 80% at 50% 50%, transparent 60%, rgba(40,20,40,.22))}
  .hint{position:absolute; left:50%; bottom:.9rem; transform:translateX(-50%);
    font:.58rem/1 var(--mono); letter-spacing:.22em; color:rgba(40,20,40,.34);
    pointer-events:none}
  .specs{display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center}
  .chip{font:.62rem/1 var(--mono); letter-spacing:.04em; color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:.4rem .7rem}
  .chip b{color:var(--green); font-weight:500}
</style>
</head>
<body>
  <div class="ds-tag">JD · ⑥ BACKGROUND SKINS</div>
  <div class="ds-head">
    <h1>MouseGradient</h1>
    <p>/projects 全屏流体背景——亮底之上一团焦点 radial 渐变(作品主题色 tint),渐变中心每帧用 lerp 平滑缓动靠近光标,呈现"光晕跟在指针后流动"的拖尾感。</p>
  </div>

  <div class="stage" id="stage">
    <div class="base"></div>
    <div class="bloom"></div>
    <div class="vignette"></div>
    <div class="hint">MOVE CURSOR · LERP FOLLOW 0.08</div>
  </div>

  <div class="specs">
    <span class="chip">tint <b>#7b61ff</b></span>
    <span class="chip">accent <b>#3c5347</b></span>
    <span class="chip">lerp <b>0.08</b></span>
    <span class="chip">blend <b>screen</b></span>
    <span class="chip">driver <b>rAF</b></span>
  </div>

<script>
  const stage=document.getElementById('stage');
  // target = cursor position in %, current = lerped value written to --gx/--gy each frame
  let gx=50, gy=50, tx=50, ty=50, inside=false;
  stage.addEventListener('mousemove',(e)=>{
    const r=stage.getBoundingClientRect();
    tx=((e.clientX-r.left)/r.width)*100;
    ty=((e.clientY-r.top)/r.height)*100;
    inside=true;
  });
  stage.addEventListener('mouseleave',()=>{ tx=50; ty=50; inside=false; });
  function tick(){
    // ease toward target with factor 0.08 — gives the "flows behind the cursor" feel
    gx+=(tx-gx)*0.08;
    gy+=(ty-gy)*0.08;
    stage.style.setProperty('--gx', gx.toFixed(2)+'%');
    stage.style.setProperty('--gy', gy.toFixed(2)+'%');
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
