<!-- @dsCard group="① Foundations" name="Color" subtitle="Dark / Accent / Terminal" -->
<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Color — JD Kinetic System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root{
    --night:#0a0a0c; --ink:#101015; --bone:#ece8e1; --paper:#f4f2ee;
    --muted:#9a9aa2; --line:#26262e;
    --accent:#7b61ff; --green:#4ade80;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sc:'Noto Sans SC',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; min-height:100vh; color:var(--bone); font-family:var(--sc);
    background:radial-gradient(120% 80% at 50% 0%, #15151c, var(--night));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1.5rem; padding:3rem 2rem}
  .ds-tag{position:fixed; top:1.1rem; left:1.3rem; font:600 .6rem/1 var(--mono);
    letter-spacing:.24em; color:#5b5b64}
  .ds-head{text-align:center}
  .ds-head h1{margin:0; font:600 1.15rem/1.1 var(--sc)}
  .ds-head p{margin:.5rem auto 0; max-width:34rem; font:.76rem/1.6 var(--sc); color:var(--muted)}
  /* component frame */
  .stage{width:min(720px,94vw); background:var(--ink);
    border:1px solid var(--line); border-radius:12px; overflow:hidden; position:relative;
    box-shadow:0 30px 80px -30px #000; padding:1.5rem}
  .grp{margin-top:1.4rem}
  .grp:first-child{margin-top:0}
  .grp-label{font:600 .58rem/1 var(--mono); letter-spacing:.28em; color:var(--muted);
    text-transform:uppercase; margin-bottom:.85rem; display:flex; align-items:center; gap:.6rem}
  .grp-label::after{content:''; flex:1; height:1px; background:var(--line)}
  .swatches{display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:.55rem}
  .sw{border:1px solid var(--line); border-radius:9px; overflow:hidden; cursor:pointer;
    transition:transform .35s cubic-bezier(0.215,0.61,0.355,1), box-shadow .35s ease}
  .sw:hover{transform:translateY(-4px); box-shadow:0 14px 30px -14px #000}
  .sw .chipColor{height:54px; position:relative}
  .sw .chipColor::after{content:''; position:absolute; inset:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
  .sw .meta{padding:.5rem .55rem .55rem; background:var(--night)}
  .sw .nm{font:500 .68rem/1.2 var(--sc); color:var(--bone)}
  .sw .hx{font:.6rem/1.3 var(--mono); letter-spacing:.04em; color:var(--muted); margin-top:.15rem;
    text-transform:uppercase}
  /* terminal special */
  .term{display:flex; gap:.55rem; align-items:stretch}
  .term .demo{flex:1; background:#000; border:1px solid var(--line); border-radius:9px;
    padding:.7rem .85rem; font:.74rem/1.7 var(--mono); color:var(--green); position:relative; overflow:hidden}
  .term .demo .ln .p{color:#2f6b43; margin-right:.55em}
  .term .demo .cursor{display:inline-block; width:.5em; height:1.05em; background:var(--green);
    vertical-align:text-bottom; box-shadow:0 0 8px var(--green); animation:blink 1s steps(1) infinite}
  @keyframes blink{0%,49%{opacity:.9}50%,100%{opacity:0}}
  .specs{margin-top:1.5rem; display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center}
  .chip{font:.62rem/1 var(--mono); letter-spacing:.04em; color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:.4rem .7rem}
  .chip b{color:var(--green); font-weight:500}
</style>
</head>
<body>
  <div class="ds-tag">JD · ① FOUNDATIONS</div>
  <div class="ds-head">
    <h1>Color</h1>
    <p>三套色板：暗色界面底色、各作品提取的主题强调色、以及启动屏的终端绿。点击任意色块可复制（hover 抬升）。</p>
  </div>

  <div class="stage">
    <div class="grp">
      <div class="grp-label">Dark · 界面底色</div>
      <div class="swatches" id="dark"></div>
    </div>

    <div class="grp">
      <div class="grp-label">Accent · 作品主题色</div>
      <div class="swatches" id="accent"></div>
    </div>

    <div class="grp">
      <div class="grp-label">Terminal · 启动屏</div>
      <div class="term">
        <div class="swatches" style="grid-template-columns:repeat(2,minmax(96px,1fr)); flex:0 0 auto">
          <div class="sw" data-hex="#4ade80">
            <div class="chipColor" style="background:#4ade80"></div>
            <div class="meta"><div class="nm">green</div><div class="hx">#4ade80</div></div>
          </div>
          <div class="sw" data-hex="#000000">
            <div class="chipColor" style="background:#000"></div>
            <div class="meta"><div class="nm">black</div><div class="hx">#000000</div></div>
          </div>
        </div>
        <div class="demo">
          <div class="ln"><span class="p">&gt;</span>JUNK_DOGE :: boot ok</div>
          <div class="ln"><span class="p">&gt;</span>green on black<span class="cursor"></span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="specs">
    <span class="chip">dark <b>6</b></span>
    <span class="chip">accent <b>9</b></span>
    <span class="chip">terminal <b>green/black</b></span>
    <span class="chip">click <b>to copy</b></span>
  </div>

<script>
  const DARK=[
    ['--night','#0a0a0c'],['--ink','#101015'],['--bone','#ece8e1'],
    ['--paper','#f4f2ee'],['--muted','#9a9aa2'],['--line','#26262e'],
  ];
  const ACCENT=[
    ['扶桑','#3c5347'],['镜之塔','#534249'],['Centripetal Force','#2c2a2f'],
    ['破禁','#430215'],['融っ','#2f3b47'],['二十九行诗','#2e3233'],
    ['少女終幕','#9e6d9d'],['浮生','#999297'],['dev 紫','#7b61ff'],
  ];
  function card([nm,hx]){
    const d=document.createElement('div'); d.className='sw'; d.dataset.hex=hx;
    d.innerHTML=`<div class="chipColor" style="background:${hx}"></div>
      <div class="meta"><div class="nm">${nm}</div><div class="hx">${hx}</div></div>`;
    return d;
  }
  DARK.forEach(c=>document.getElementById('dark').appendChild(card(c)));
  ACCENT.forEach(c=>document.getElementById('accent').appendChild(card(c)));
  document.addEventListener('click',e=>{
    const sw=e.target.closest('.sw'); if(!sw) return;
    const hx=sw.dataset.hex; const nm=sw.querySelector('.nm'); const old=nm.textContent;
    if(navigator.clipboard) navigator.clipboard.writeText(hx).catch(()=>{});
    nm.textContent='copied ✓';
    setTimeout(()=>{ nm.textContent=old; },900);
  });
</script>
</body>
</html>
